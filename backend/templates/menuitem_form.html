{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} MenuItem | NexusRestaurant{% endblock %}
{% block page_title %}{% if editing %}Edit MenuItem{% else %}New MenuItem{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="starters" {% if record.category == 'starters' %}selected{% endif %}>Starters</option>
          <option value="main_course" {% if record.category == 'main_course' %}selected{% endif %}>Main Course</option>
          <option value="desserts" {% if record.category == 'desserts' %}selected{% endif %}>Desserts</option>
          <option value="beverages" {% if record.category == 'beverages' %}selected{% endif %}>Beverages</option>
          <option value="specials" {% if record.category == 'specials' %}selected{% endif %}>Specials</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price</label>
        <input type="number" step="0.01" name="price" value="{{ record.price|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Cost</label>
        <input type="number" step="0.01" name="cost" value="{{ record.cost|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available" {% if record.status == 'available' %}selected{% endif %}>Available</option>
          <option value="unavailable" {% if record.status == 'unavailable' %}selected{% endif %}>Unavailable</option>
          <option value="seasonal" {% if record.status == 'seasonal' %}selected{% endif %}>Seasonal</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="veg" id="id_veg" {% if record.veg %}checked{% endif %}>
        <label for="id_veg" style="margin-bottom:0">Veg</label>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Spice Level</label>
        <select name="spice_level">
          <option value="mild" {% if record.spice_level == 'mild' %}selected{% endif %}>Mild</option>
          <option value="medium" {% if record.spice_level == 'medium' %}selected{% endif %}>Medium</option>
          <option value="hot" {% if record.spice_level == 'hot' %}selected{% endif %}>Hot</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} MenuItem</button>
      <a href="/menuitems/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
